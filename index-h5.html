<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c1810">
<title>环球史迹 · Global Chronicles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Noto+Serif+SC:wght@300;400;600&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1A6B4A;
    --green-light: #2a8a5f;
    --green-dim: #0f3d2a;
    --gold: #C9963A;
    --gold-light: #e8b85a;
    --ink: #0c1810;
    --paper: #F5EFE0;
    --mist: #8aad96;
    --white: #faf8f3;
    --serif: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
    --mono: 'Courier Prime', 'Courier New', monospace;
    --body: 'Noto Serif SC', Georgia, serif;
    --tab-height: 60px;
    --header-height: 52px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--ink);
    color: var(--white);
    font-family: var(--body);
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: var(--tab-height);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.5;
  }

  /* ─── TOP HEADER ─── */
  .masthead {
    position: sticky;
    top: 0;
    z-index: 100;
    height: var(--header-height);
    background: rgba(12,24,16,0.96);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(201,150,58,0.2);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
  }

  .masthead-logo {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 900;
    letter-spacing: 0.04em;
    color: var(--gold);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .masthead-logo span {
    color: var(--mist);
    font-weight: 400;
    font-style: italic;
    font-size: 0.72rem;
    margin-left: 8px;
  }

  .masthead-city {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: rgba(138,173,150,0.6);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-left: auto;
    white-space: nowrap;
  }

  /* ─── HERO ─── */
  .hero {
    position: relative;
    min-height: 56vw;
    max-height: 280px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 24px 20px 20px;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    transition: background 0.5s ease;
  }

  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(12,24,16,0.15) 0%, rgba(12,24,16,0.85) 100%);
  }

  .hero-content {
    position: relative;
    z-index: 1;
  }

  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.5s 0.1s forwards;
  }

  .hero-title {
    font-family: var(--serif);
    font-size: clamp(2.2rem, 10vw, 3.2rem);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: var(--white);
    opacity: 0;
    animation: fadeUp 0.5s 0.15s forwards;
  }

  .hero-title em {
    font-style: italic;
    color: var(--gold-light);
    font-size: 0.65em;
    display: block;
    margin-top: 4px;
  }

  .hero-meta {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    opacity: 0;
    animation: fadeUp 0.5s 0.25s forwards;
  }

  .hero-stat {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: rgba(138,173,150,0.7);
    letter-spacing: 0.06em;
  }

  .hero-stat strong {
    color: var(--gold);
    font-size: 0.9rem;
    display: block;
    font-family: var(--serif);
    font-weight: 700;
  }

  /* ─── OVERVIEW ─── */
  .overview {
    margin: 0;
    padding: 16px 20px;
    background: rgba(201,150,58,0.05);
    border-bottom: 1px solid rgba(201,150,58,0.15);
    border-left: 3px solid var(--gold);
  }

  .overview p {
    font-size: 0.82rem;
    color: rgba(250,248,243,0.7);
    line-height: 1.75;
    font-style: italic;
  }

  /* ─── SECTION TABS (Timeline / Landmarks) ─── */
  .section-tabs {
    display: flex;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    position: sticky;
    top: var(--header-height);
    z-index: 90;
    background: var(--ink);
  }

  .section-tab {
    flex: 1;
    padding: 14px 8px;
    text-align: center;
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(138,173,150,0.5);
    cursor: pointer;
    transition: color 0.2s;
    border-bottom: 2px solid transparent;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    -webkit-appearance: none;
  }

  .section-tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* ─── PANELS ─── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ─── TIMELINE ─── */
  .timeline-wrap {
    padding: 24px 20px 32px;
  }

  .timeline {
    position: relative;
    padding-left: 24px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 4px;
    top: 8px;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    opacity: 0.3;
  }

  .timeline-item {
    position: relative;
    margin-bottom: 32px;
    opacity: 0;
    transform: translateX(-8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .timeline-item.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .timeline-item::before {
    content: '';
    position: absolute;
    left: -21px;
    top: 7px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green-light);
    border: 2px solid var(--gold);
    box-shadow: 0 0 6px rgba(201,150,58,0.4);
  }

  .timeline-year {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 5px;
  }

  .timeline-event {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 700;
    color: var(--white);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .timeline-desc {
    font-size: 0.8rem;
    color: var(--mist);
    line-height: 1.7;
  }

  /* ─── LANDMARKS ─── */
  .landmarks-wrap {
    padding: 20px 16px 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .landmark-card {
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.2s, background 0.2s;
  }

  .landmark-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .landmark-card.expanded {
    border-color: rgba(201,150,58,0.5);
    background: rgba(12,24,16,0.7);
  }

  .landmark-head {
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .landmark-head-text { flex: 1; }

  .landmark-name {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 700;
    color: var(--white);
    line-height: 1.25;
  }

  .landmark-era {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .landmark-toggle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(201,150,58,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-size: 1rem;
    transition: transform 0.3s, background 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }

  .landmark-card.expanded .landmark-toggle {
    transform: rotate(45deg);
    background: var(--gold);
    color: var(--ink);
  }

  .landmark-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }

  .landmark-body.open {
    max-height: 800px;
  }

  .landmark-content {
    padding: 0 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .landmark-banner {
    width: 100%;
    height: 180px;
    border-radius: 6px;
    margin: 16px 0 14px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-end;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
    background-size: cover;
    background-position: center;
    background-color: #1a2d22;
  }

  .landmark-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 60%);
    border-radius: 6px;
  }

  .landmark-banner-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.1rem;
    font-weight: 900;
    color: #fff;
    position: relative;
    z-index: 1;
    text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    line-height: 1.2;
  }

  .landmark-banner-era {
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.7);
    position: relative;
    z-index: 1;
    margin-top: 4px;
  }

  .landmark-desc {
    font-size: 0.82rem;
    color: #c8ddd0;
    line-height: 1.75;
    margin-bottom: 14px;
  }

  .practical-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 14px;
    background: rgba(12,24,16,0.8);
    border: 1px solid rgba(201,150,58,0.25);
    border-radius: 4px;
    margin-bottom: 12px;
  }

  .info-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .info-label {
    font-family: var(--mono);
    font-size: 0.56rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #C9963A;
  }

  .info-value {
    font-size: 0.76rem;
    color: #e8f5ee;
    line-height: 1.5;
  }

  .info-value.free { color: #6ec67a; font-weight: 600; }

  .info-note {
    grid-column: 1 / -1;
    font-size: 0.72rem;
    color: #8aad96;
    font-style: italic;
    padding-top: 8px;
    border-top: 1px solid rgba(201,150,58,0.12);
    line-height: 1.6;
  }

  .landmark-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid rgba(138,173,150,0.25);
    color: var(--mist);
    border-radius: 2px;
  }

  /* ─── BOTTOM CITY TAB BAR ─── */
  .city-tabbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--tab-height);
    background: rgba(10,20,14,0.97);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(201,150,58,0.2);
    display: flex;
    z-index: 200;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }

  .city-tabbar::-webkit-scrollbar { display: none; }

  .city-tab {
    flex: 1;
    min-width: 68px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    transition: background 0.2s;
    background: none;
    border: none;
    padding: 0 6px;
    -webkit-appearance: none;
  }

  .city-tab:active { background: rgba(201,150,58,0.08); }

  .city-tab-cn {
    font-family: var(--body);
    font-size: 0.78rem;
    font-weight: 600;
    color: rgba(138,173,150,0.5);
    transition: color 0.2s;
    white-space: nowrap;
  }

  .city-tab-en {
    font-family: var(--mono);
    font-size: 0.52rem;
    letter-spacing: 0.06em;
    color: rgba(138,173,150,0.3);
    transition: color 0.2s;
    white-space: nowrap;
  }

  .city-tab.active .city-tab-cn { color: var(--gold); }
  .city-tab.active .city-tab-en { color: rgba(201,150,58,0.5); }

  .city-tab.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    width: 24px;
    height: 2px;
    background: var(--gold);
    border-radius: 1px;
  }

  .city-tab { position: relative; }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .page-enter {
    animation: fadeIn 0.35s ease forwards;
  }

  /* ─── FOOTER ─── */
  .footer {
    padding: 20px 20px 12px;
    border-top: 1px solid rgba(255,255,255,0.05);
    text-align: center;
  }

  .footer p {
    font-family: var(--mono);
    font-size: 0.58rem;
    color: rgba(138,173,150,0.3);
    letter-spacing: 0.1em;
    line-height: 1.8;
  }

  /* ─── SECTION LABEL ─── */
  .section-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201,150,58,0.2);
  }

  /* Safe area for notch phones */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    body { padding-bottom: calc(var(--tab-height) + env(safe-area-inset-bottom)); }
    .city-tabbar { padding-bottom: env(safe-area-inset-bottom); height: calc(var(--tab-height) + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-logo">环球史迹<span>Global Chronicles</span></div>
  <div class="masthead-city" id="mastCityLabel"></div>
</header>

<div id="app"></div>

<nav class="city-tabbar" id="cityTabbar"></nav>

<script>

      { name: '埃及博物馆', era: '近代·1902年', wiki: 'Egyptian Museum', gradient: 'linear-gradient(135deg, #1A1A3A 0%, #6A4A8B 50%, #0D0D1E 100%)', desc: '开罗埃及博物馆收藏文物逾17万件，镇馆之宝包括图坦卡蒙法老的黄金面具及全套陪葬品（1922年发掘）。新大埃及博物馆正在吉萨金字塔旁建设中。', hours: '09:00—17:00，全年开放', ticket: '£E200（约45元）；木乃伊室另收 £E200', note: '图坦卡蒙展品位于2楼正中心区域，是最不应错过的展区。', tags: ['埃及学', '图坦卡蒙', '法老文物'] },
      { name: '爱资哈尔清真寺', era: '法蒂玛·970年', wiki: 'Al-Azhar Mosque', gradient: 'linear-gradient(135deg, #0A2A1A 0%, #1A6B4A 50%, #0D3D26 100%)', desc: '爱资哈尔清真寺由法蒂玛王朝建造，附属大学建于975年，是世界上最古老的持续运作的大学之一，也是伊斯兰世界最权威的宗教学术机构。', hours: '09:00—17:00（礼拜时关闭约30分钟）', ticket: '免费', note: '需脱鞋、着装保守，入口处提供长袍借用。周边汗·哈利利市集是购买香料、铜器的好去处。', tags: ['法蒂玛王朝', '世界最古老大学', '伊斯兰建筑'] },
      { name: '萨拉丁城堡', era: '阿尤布·1183年', wiki: 'Cairo Citadel', gradient: 'linear-gradient(135deg, #2A2A1A 0%, #6B6B2A 50%, #1A1A0A 100%)', desc: '萨拉丁城堡位于穆卡塔姆山丘顶端，俯瞰整个开罗城。城堡内的穆罕默德·阿里清真寺仿照伊斯坦布尔蓝色清真寺而建，是埃及最著名的奥斯曼时期建筑。', hours: '08:00—17:00，全年开放', ticket: '£E200（约45元，含多个博物馆）', note: '城堡顶部是俯瞰开罗全景和金字塔群的最佳位置。傍晚日落景色壮观。', tags: ['阿尤布王朝', '军事建筑', '俯瞰全城'] },
    ]
  }
];

let activeCity = CITIES[0];
let activeTab = 'timeline'; // 'timeline' | 'landmarks'

function renderTabbar() {
  const el = document.getElementById('cityTabbar');
  el.innerHTML = CITIES.map(c => `
    <button class="city-tab ${c.id === activeCity.id ? 'active' : ''}" onclick="switchCity('${c.id}')">
      <span class="city-tab-cn">${c.name}</span>
      <span class="city-tab-en">${c.nameEn}</span>
    </button>
  `).join('');
}

function switchCity(id) {
  activeCity = CITIES.find(c => c.id === id);
  activeTab = 'timeline';
  renderTabbar();
  renderApp();
  document.getElementById('app').scrollIntoView({ behavior: 'smooth', block: 'start' });
  setTimeout(animateIn, 80);
  loadWikiImages(activeCity.landmarks);
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.section-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  document.querySelectorAll('.panel').forEach(el => {
    el.classList.toggle('active', el.dataset.panel === tab);
  });
  setTimeout(animateIn, 60);
}

function renderApp() {
  const c = activeCity;
  document.getElementById('mastCityLabel').textContent = c.name + ' · ' + c.nameEn;

  document.getElementById('app').innerHTML = `
    <div class="page-enter">
      <section class="hero">
        <div class="hero-bg" style="background: ${c.gradient}"></div>
        <div class="hero-content">
          <div class="hero-eyebrow">— ${c.country} · 历史与遗迹 ·</div>
          <h1 class="hero-title">${c.name}<em>${c.nameEn}</em></h1>
          <div class="hero-meta">
            <div class="hero-stat"><strong>${c.timeline.length}</strong>历史节点</div>
            <div class="hero-stat"><strong>${c.landmarks.length}</strong>重要景点</div>
            <div class="hero-stat"><strong style="font-size:0.7rem;letter-spacing:0.03em;">${c.coords}</strong>坐标</div>
          </div>
        </div>
      </section>

      <div class="overview"><p>${c.overview}</p></div>

      <div class="section-tabs">
        <button class="section-tab ${activeTab === 'timeline' ? 'active' : ''}" data-tab="timeline" onclick="switchTab('timeline')">历史时间轴</button>
        <button class="section-tab ${activeTab === 'landmarks' ? 'active' : ''}" data-tab="landmarks" onclick="switchTab('landmarks')">重要景点</button>
      </div>

      <div class="panel ${activeTab === 'timeline' ? 'active' : ''}" data-panel="timeline">
        <div class="timeline-wrap">
          <div class="timeline">
            ${c.timeline.map((t, i) => `
              <div class="timeline-item" style="transition-delay:${i * 0.06}s">
                <div class="timeline-year">${t.year}</div>
                <div class="timeline-event">${t.event}</div>
                <div class="timeline-desc">${t.desc}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <div class="panel ${activeTab === 'landmarks' ? 'active' : ''}" data-panel="landmarks">
        <div class="landmarks-wrap">
          ${c.landmarks.map((l, i) => `
            <div class="landmark-card" id="lm-${i}" style="transition-delay:${i * 0.08}s" onclick="toggleLandmark(${i})">
              <div class="landmark-head">
                <div class="landmark-head-text">
                  <div class="landmark-name">${l.name}</div>
                  <div class="landmark-era">${l.era}</div>
                </div>
                <div class="landmark-toggle">+</div>
              </div>
              <div class="landmark-body" id="lb-${i}">
                <div class="landmark-content">
                  <div class="landmark-banner" id="banner-${i}" style="background: ${l.gradient}">
                    <div class="landmark-banner-name">${l.name}</div>
                    <div class="landmark-banner-era">${l.era}</div>
                  </div>
                  <p class="landmark-desc">${l.desc}</p>
                  <div class="practical-info">
                    <div class="info-item">
                      <span class="info-label">⏱ 开放时间</span>
                      <span class="info-value">${l.hours}</span>
                    </div>
                    <div class="info-item">
                      <span class="info-label">🎟 门票</span>
                      <span class="info-value ${l.ticket.includes('免费') ? 'free' : ''}">${l.ticket}</span>
                    </div>
                    ${l.note ? `<div class="info-note">💡 ${l.note}</div>` : ''}
                  </div>
                  <div class="landmark-tags">${l.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <footer class="footer">
        <p>© 2026 环球史迹 · Global Chronicles</p>
        <p>历史 · 文化 · 遗迹</p>
      </footer>
    </div>
  `;
}

function toggleLandmark(i) {
  const card = document.getElementById(`lm-${i}`);
  const body = document.getElementById(`lb-${i}`);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  card.classList.toggle('expanded', !isOpen);
}

function animateIn() {
  document.querySelectorAll('.timeline-item, .landmark-card').forEach(el => {
    el.classList.add('visible');
  });
}

// Fetch real landmark photos from Wikipedia API
async function loadWikiImages(landmarks) {
  const wikiTitles = landmarks.filter(l => l.wiki).map(l => l.wiki);
  if (!wikiTitles.length) return;

  const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${wikiTitles.map(encodeURIComponent).join('|')}&prop=pageimages&format=json&pithumbsize=800&origin=*`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    const pages = data.query.pages;

    // Build title → image URL map (Wikipedia may normalize titles)
    const imgMap = {};
    for (const page of Object.values(pages)) {
      if (page.thumbnail?.source) {
        imgMap[page.title] = page.thumbnail.source;
      }
    }

    // Apply images to banners
    landmarks.forEach((l, i) => {
      if (!l.wiki) return;
      // Try exact match first, then case-insensitive
      const imgUrl = imgMap[l.wiki] || Object.entries(imgMap).find(([k]) => k.toLowerCase() === l.wiki.toLowerCase())?.[1];
      if (imgUrl) {
        const banner = document.getElementById(`banner-${i}`);
        if (banner) {
          banner.style.backgroundImage = `url('${imgUrl}')`;
          banner.style.backgroundSize = 'cover';
          banner.style.backgroundPosition = 'center';
        }
      }
    });
  } catch (e) {
    console.warn('Wikipedia image fetch failed:', e);
  }
}

// Init
renderTabbar();
renderApp();
setTimeout(animateIn, 120);
loadWikiImages(activeCity.landmarks);
</script>
