<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>环球史迹 · Global Chronicles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Noto+Serif+SC:wght@300;400;600&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1A6B4A;
    --green-light: #2a8a5f;
    --green-dim: #0f3d2a;
    --gold: #C9963A;
    --gold-light: #e8b85a;
    --ink: #0c1810;
    --paper: #F5EFE0;
    --paper-dim: #ede5cf;
    --mist: #8aad96;
    --white: #faf8f3;
    --serif: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
    --mono: 'Courier Prime', 'Courier New', monospace;
    --body: 'Noto Serif SC', Georgia, serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--ink);
    color: var(--white);
    font-family: var(--body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── NOISE TEXTURE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.6;
  }

  /* ─── MASTHEAD ─── */
  .masthead {
    border-bottom: 1px solid rgba(201,150,58,0.3);
    padding: 0 clamp(20px, 5vw, 80px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(12,24,16,0.92);
    backdrop-filter: blur(12px);
    height: 64px;
  }

  .masthead-logo {
    font-family: var(--serif);
    font-size: 1.2rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    color: var(--gold);
    white-space: nowrap;
  }

  .masthead-logo span {
    color: var(--mist);
    font-weight: 400;
    font-style: italic;
    font-size: 0.85rem;
    margin-left: 10px;
  }

  .masthead-nav {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }

  .masthead-nav::-webkit-scrollbar { display: none; }

  .city-pill {
    padding: 6px 16px;
    border-radius: 2px;
    border: 1px solid rgba(201,150,58,0.25);
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    background: transparent;
    color: var(--mist);
  }

  .city-pill:hover { border-color: var(--gold); color: var(--gold); }
  .city-pill.active {
    background: var(--gold);
    color: var(--ink);
    border-color: var(--gold);
    font-weight: 700;
  }

  /* ─── HERO SPREAD ─── */
  .hero {
    padding: clamp(40px, 8vw, 100px) clamp(20px, 5vw, 80px) clamp(30px, 5vw, 60px);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 40px;
    align-items: end;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    min-height: 220px;
  }

  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.6s 0.1s forwards;
  }

  .hero-title {
    font-family: var(--serif);
    font-size: clamp(2.5rem, 7vw, 6rem);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: var(--white);
    opacity: 0;
    animation: fadeUp 0.6s 0.2s forwards;
  }

  .hero-title em {
    font-style: italic;
    color: var(--gold);
  }

  .hero-sub {
    font-size: 0.9rem;
    color: var(--mist);
    margin-top: 16px;
    line-height: 1.6;
    max-width: 480px;
    opacity: 0;
    animation: fadeUp 0.6s 0.3s forwards;
  }

  .hero-coords {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: rgba(138,173,150,0.5);
    line-height: 1.8;
    text-align: right;
    opacity: 0;
    animation: fadeUp 0.6s 0.4s forwards;
  }

  /* ─── MAIN LAYOUT ─── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
    min-height: calc(100vh - 280px);
  }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .hero { grid-template-columns: 1fr; }
    .hero-coords { text-align: left; }
  }

  /* ─── TIMELINE COLUMN ─── */
  .timeline-col {
    padding: clamp(30px, 4vw, 60px) clamp(20px, 5vw, 80px);
    border-right: 1px solid rgba(255,255,255,0.06);
  }

  .section-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201,150,58,0.2);
  }

  /* Timeline */
  .timeline {
    position: relative;
    padding-left: 28px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 5px;
    top: 8px;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    opacity: 0.3;
  }

  .timeline-item {
    position: relative;
    margin-bottom: 40px;
    opacity: 0;
    transform: translateX(-10px);
    transition: all 0.5s ease;
  }

  .timeline-item.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .timeline-item::before {
    content: '';
    position: absolute;
    left: -24px;
    top: 8px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green-light);
    border: 2px solid var(--gold);
    box-shadow: 0 0 8px rgba(201,150,58,0.3);
  }

  .timeline-year {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .timeline-event {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--white);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .timeline-desc {
    font-size: 0.82rem;
    color: var(--mist);
    line-height: 1.65;
  }

  /* ─── LANDMARKS COLUMN ─── */
  .landmarks-col {
    padding: clamp(30px, 4vw, 60px) clamp(16px, 3vw, 40px);
    background: rgba(255,255,255,0.015);
  }

  .landmark-card {
    border: 1px solid rgba(255,255,255,0.07);
    margin-bottom: 16px;
    cursor: pointer;
    transition: all 0.25s;
    overflow: hidden;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s, transform 0.4s, border-color 0.2s, background 0.2s;
  }

  .landmark-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .landmark-card:hover {
    border-color: rgba(201,150,58,0.4);
    background: rgba(201,150,58,0.04);
  }

  .landmark-card.expanded {
    border-color: var(--gold);
    background: rgba(12,24,16,0.7);
  }

  .landmark-content {
    padding: 0 20px 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 16px;
  }

  .landmark-desc {
    font-size: 0.82rem;
    color: #c8ddd0;
    line-height: 1.75;
    margin-bottom: 0;
  }

  .landmark-head {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
  }

  .landmark-name {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
  }

  .landmark-era {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .landmark-toggle {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid rgba(201,150,58,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-size: 0.8rem;
    transition: transform 0.3s, background 0.2s;
    flex-shrink: 0;
  }

  .landmark-card.expanded .landmark-toggle {
    transform: rotate(45deg);
    background: var(--gold);
    color: var(--ink);
  }

  .landmark-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }

  .landmark-body.open {
    max-height: 600px;
  }

  .landmark-content {
    padding: 0 20px 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 16px;
  }

  .landmark-img {
    display: none; /* hide broken external images */
  }

  .landmark-banner {
    width: 100%;
    height: 140px;
    border-radius: 2px;
    margin-bottom: 14px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-end;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }

  .landmark-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: inherit;
    filter: blur(0px);
  }

  .landmark-banner-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.1rem;
    font-weight: 900;
    color: rgba(255,255,255,0.95);
    position: relative;
    z-index: 1;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    line-height: 1.2;
  }

  .landmark-banner-era {
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.6);
    position: relative;
    z-index: 1;
    margin-top: 4px;
  }

  .landmark-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 14px;
  }

  .tag {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid rgba(138,173,150,0.3);
    color: var(--mist);
    border-radius: 2px;
  }

  /* ─── PRACTICAL INFO ─── */
  .practical-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 14px 0 0;
    padding: 14px;
    background: rgba(12,24,16,0.88);
    border: 1px solid rgba(201,150,58,0.3);
    border-radius: 3px;
  }

  .info-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .info-label {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #C9963A;
  }

  .info-value {
    font-size: 0.78rem;
    color: #e8f5ee;
    line-height: 1.5;
  }

  .info-value.free {
    color: #6ec67a;
    font-weight: 600;
  }

  .info-note {
    grid-column: 1 / -1;
    font-size: 0.72rem;
    color: #8aad96;
    font-style: italic;
    padding-top: 8px;
    border-top: 1px solid rgba(201,150,58,0.15);
    line-height: 1.6;
  }

  /* ─── OVERVIEW BAR ─── */
  .overview-bar {
    margin-bottom: 28px;
    padding: 16px 20px;
    border-left: 3px solid var(--gold);
    background: rgba(201,150,58,0.05);
  }

  .overview-text {
    font-size: 0.83rem;
    color: rgba(250,248,243,0.7);
    line-height: 1.7;
    font-style: italic;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── FOOTER ─── */
  footer {
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 24px clamp(20px, 5vw, 80px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  footer p {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: rgba(138,173,150,0.4);
    letter-spacing: 0.1em;
  }

  /* ─── LOADING STATE ─── */
  .city-content {
    display: none;
  }
  .city-content.active {
    display: contents;
  }

  /* Divider decoration */
  .ornament {
    text-align: center;
    color: var(--gold);
    opacity: 0.3;
    font-size: 1rem;
    margin: 8px 0 28px;
    letter-spacing: 0.4em;
  }
</style>
</head>

let activeCity = CITIES[0];

function renderNav() {
  const nav = document.getElementById('cityNav');
  nav.innerHTML = CITIES.map(c => `
    <button class="city-pill ${c.id === activeCity.id ? 'active' : ''}" onclick="switchCity('${c.id}')">
      ${c.name} · ${c.nameEn}
    </button>
  `).join('');
}

function switchCity(id) {
  activeCity = CITIES.find(c => c.id === id);
  renderNav();
  renderApp();
  setTimeout(animateIn, 50);
}

function renderApp() {
  const app = document.getElementById('app');
  const c = activeCity;
  app.innerHTML = `
    <section class="hero">
      <div>
        <div class="hero-eyebrow">— ${c.country} · 历史与遗迹 ·</div>
        <h1 class="hero-title">${c.name}<br><em>${c.nameEn}</em></h1>
        <p class="hero-sub">${c.overview}</p>
      </div>
      <div class="hero-coords">${c.coords.replace('  ', '<br>')}<br><br>${c.timeline.length} 个历史节点<br>${c.landmarks.length} 处重要景点</div>
    </section>

    <div class="main-grid">
      <div class="timeline-col">
        <div class="section-label">历史时间轴</div>
        <div class="ornament">· · ·</div>
        <div class="timeline">
          ${c.timeline.map((t, i) => `
            <div class="timeline-item" style="transition-delay: ${i * 0.07}s">
              <div class="timeline-year">${t.year}</div>
              <div class="timeline-event">${t.event}</div>
              <div class="timeline-desc">${t.desc}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="landmarks-col">
        <div class="section-label">重要景点</div>
        <div class="ornament">· · ·</div>
        ${c.landmarks.map((l, i) => `
          <div class="landmark-card" id="lm-${i}" style="transition-delay: ${i * 0.1}s" onclick="toggleLandmark(${i})">
            <div class="landmark-head">
              <div>
                <div class="landmark-name">${l.name}</div>
                <div class="landmark-era">${l.era}</div>
              </div>
              <div class="landmark-toggle">+</div>
            </div>
            <div class="landmark-body" id="lb-${i}">
              <div class="landmark-content">
                <div class="landmark-banner" style="background: ${l.gradient}">
                  <div class="landmark-banner-name">${l.name}</div>
                  <div class="landmark-banner-era">${l.era}</div>
                </div>
                <p class="landmark-desc">${l.desc}</p>
                <div class="practical-info">
                  <div class="info-item">
                    <span class="info-label">⏱ 开放时间</span>
                    <span class="info-value">${l.hours}</span>
                  </div>
                  <div class="info-item">
                    <span class="info-label">🎟 门票</span>
                    <span class="info-value ${l.ticket.includes('免费') ? 'free' : ''}">${l.ticket}</span>
                  </div>
                  ${l.note ? `<div class="info-note">💡 ${l.note}</div>` : ''}
                </div>
                <div class="landmark-tags">${l.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function toggleLandmark(i) {
  const card = document.getElementById(`lm-${i}`);
  const body = document.getElementById(`lb-${i}`);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  card.classList.toggle('expanded', !isOpen);
}

function animateIn() {
  document.querySelectorAll('.timeline-item, .landmark-card').forEach(el => {
    el.classList.add('visible');
  });
}

// Init
renderNav();
renderApp();
setTimeout(animateIn, 100);
</script>
